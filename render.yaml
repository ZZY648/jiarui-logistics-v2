services:
  - type: web
    name: jiarui-logistics
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_PASSWORD
        sync: false
      - key: DATA_FILE
        value: /var/data/data.json
    disk:
      name: jiarui-data
      mountPath: /var/data
      sizeGB: 1