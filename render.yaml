services:
  - type: web
    name: jiarui-logistics
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_PASSWORD
        sync: false
      - key: DATA_FILE
        value: /tmp/jiarui-logistics/data.json