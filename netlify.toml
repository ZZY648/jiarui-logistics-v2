[build]
  command = "npm run build:netlify"
  publish = "server/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]
  included_files = ["server/server.js", "server/src/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200