  <g id="ic-search"><circle cx="8.5" cy="8.5" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12.5" y1="12.5" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
  <g id="ic-check"><circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6 10.5 9 13l5.5-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g>

<style>
/* ============ Design System · 深色科技风 ============ */
:root {
  --c-primary:#06b6d4; --c-primary-light:#22d3ee; --c-primary-dark:#0891b2; --c-primary-bg:rgba(6,182,212,.1);
  --c-accent:#8b5cf6; --c-accent-light:#a78bfa;
  --c-success:#10b981; --c-success-bg:rgba(16,185,129,.12);
  --c-warning:#f59e0b; --c-warning-bg:rgba(245,158,11,.12);
  --c-danger:#ef4444; --c-danger-bg:rgba(239,68,68,.12);
  --c-bg-0:#0a0e1a; --c-bg-1:#0f1525; --c-bg-2:#151c30; --c-bg-3:#1c263e;
  --c-line:rgba(255,255,255,.07); --c-line-strong:rgba(255,255,255,.14);
  --c-text:#e2e8f0; --c-text-dim:#94a3b8; --c-text-dimmer:#64748b;
  /* 兼容旧代码中的 --c-gray-* 变量，映射到深色主题 */
  --c-gray-50:rgba(255,255,255,.04); --c-gray-100:rgba(255,255,255,.06);
  --c-gray-200:rgba(255,255,255,.12); --c-gray-300:rgba(255,255,255,.18);
  --c-gray-400:#64748b; --c-gray-500:#94a3b8; --c-gray-600:#cbd5e1;
  --c-gray-700:#e2e8f0; --c-gray-800:#f1f5f9; --c-gray-900:#f8fafc;
  --c-glow-cyan:0 0 20px rgba(6,182,212,.35); --c-glow-violet:0 0 20px rgba(139,92,246,.35);
  --radius-sm:8px; --radius:10px; --radius-lg:14px; --radius-xl:20px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 16px rgba(0,0,0,.35);
  --shadow-md:0 8px 28px rgba(0,0,0,.4);
  --shadow-lg:0 16px 48px rgba(0,0,0,.5);
  --shadow-xl:0 24px 72px rgba(0,0,0,.6);
  --transition:0.2s ease;
  --grad-primary:linear-gradient(135deg,#06b6d4,#3b82f6);
  --grad-accent:linear-gradient(135deg,#8b5cf6,#ec4899);
  --glass-bg:rgba(21,28,48,.72); --glass-border:rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif;background:var(--c-bg-0);color:var(--c-text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;font-size:14px;background-image:radial-gradient(rgba(6,182,212,.07) 1px,transparent 1px);background-size:32px 32px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(6,182,212,.4)}

/* 通用表单元素暗色样式（覆盖非弹窗场景：调度页、轨迹搜索等） */
input[type="text"],input[type="number"],input[type="password"],input[type="search"],select{background:rgba(10,16,28,.55);color:var(--c-text);border:1.5px solid var(--c-line);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;outline:none;transition:all var(--transition);font-family:inherit}
input[type="text"]:focus,input[type="number"]:focus,input[type="search"]:focus,select:focus{border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(6,182,212,.15),0 0 16px rgba(6,182,212,.2);background:rgba(10,16,28,.8)}
input[type="text"]:hover:not(:focus),input[type="number"]:hover:not(:focus),input[type="search"]:hover:not(:focus),select:hover:not(:focus){border-color:var(--c-line-strong)}
input::placeholder{color:var(--c-text-dimmer)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer}
input[type="date"]::-webkit-datetime-edit-text,input[type="date"]::-webkit-datetime-edit-month-field,input[type="date"]::-webkit-datetime-edit-day-field,input[type="date"]::-webkit-datetime-edit-year-field{color:var(--c-text)}
input[type="date"]{color-scheme:dark}

.ic{width:18px;height:18px;display:inline-block;vertical-align:-4px;flex-shrink:0}
.ic-sm{width:15px;height:15px;vertical-align:-3px}

#toastContainer{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);pointer-events:auto;animation:slideIn .25s ease;max-width:380px;display:flex;align-items:center;gap:8px;cursor:pointer;backdrop-filter:blur(12px)}
.toast.success{background:rgba(16,185,129,.95);box-shadow:0 8px 28px rgba(16,185,129,.3)}
.toast.error{background:rgba(239,68,68,.95);box-shadow:0 8px 28px rgba(239,68,68,.3)}
.toast.warning{background:rgba(245,158,11,.95);box-shadow:0 8px 28px rgba(245,158,11,.3)}
.toast.info{background:rgba(6,182,212,.95);box-shadow:0 8px 28px rgba(6,182,212,.3)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ============ 登录页 ============ */
.login-page{display:flex;justify-content:center;align-items:center;min-height:100vh;background:var(--c-bg-0);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;top:-30%;right:-20%;width:700px;height:700px;background:radial-gradient(circle,rgba(6,182,212,.18),transparent 60%);border-radius:50%;animation:floatGlow 12s ease-in-out infinite}
.login-page::after{content:'';position:absolute;bottom:-25%;left:-15%;width:550px;height:550px;background:radial-gradient(circle,rgba(139,92,246,.15),transparent 60%);border-radius:50%;animation:floatGlow 15s ease-in-out infinite reverse}
@keyframes floatGlow{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-30px) scale(1.1)}}
.login-box{background:var(--glass-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:44px 40px;border-radius:var(--radius-xl);box-shadow:var(--shadow-xl),0 0 60px rgba(6,182,212,.15);width:420px;position:relative;z-index:1;border:1px solid var(--glass-border)}
.login-box::before{content:'';position:absolute;inset:0;border-radius:var(--radius-xl);padding:1px;background:linear-gradient(135deg,rgba(6,182,212,.4),transparent 40%,rgba(139,92,246,.4));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.login-box .brand{text-align:center;margin-bottom:28px}
.login-box .brand .mark{font-size:38px;font-weight:800;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-1px;line-height:1;filter:drop-shadow(0 0 16px rgba(6,182,212,.4))}
.login-box .brand .sub{font-size:12px;color:var(--c-text-dimmer);margin-top:6px;letter-spacing:4px}
.field{position:relative;margin-bottom:14px}
.field svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--c-text-dimmer);width:18px;height:18px;transition:color var(--transition);z-index:1}
.field input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--c-line);border-radius:var(--radius);font-size:14px;outline:none;background:rgba(15,21,37,.6);color:var(--c-text);transition:all var(--transition)}
.field input:focus{border-color:var(--c-primary);box-shadow:0 0 0 4px rgba(6,182,212,.12),var(--c-glow-cyan);background:rgba(15,21,37,.9)}
.field input:focus~svg,.field input:focus+svg{color:var(--c-primary)}
.field input::placeholder{color:var(--c-text-dimmer)}
.login-box>button{width:100%;padding:13px;background:var(--grad-primary);color:#fff;border:none;border-radius:var(--radius);font-size:15px;cursor:pointer;font-weight:600;letter-spacing:1px;transition:all var(--transition);margin-top:6px;box-shadow:0 4px 20px rgba(6,182,212,.35)}
.login-box>button:hover{box-shadow:0 8px 32px rgba(6,182,212,.5);transform:translateY(-2px)}
.login-box>button:active{transform:translateY(0)}
.login-box .err{color:var(--c-danger);text-align:center;margin-top:10px;font-size:13px;min-height:18px}
.demo-box{margin-top:18px;padding:16px;background:rgba(15,21,37,.5);border-radius:var(--radius);border:1px solid var(--c-line)}
.demo-box .title{font-size:10px;color:var(--c-text-dimmer);margin-bottom:10px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
.demo-box .chips{display:flex;gap:8px;flex-wrap:wrap}
.demo-chip{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);border:1.5px solid var(--c-line);background:transparent;color:var(--c-text-dim)}
.demo-chip:hover{border-color:var(--c-primary);color:var(--c-primary-light);box-shadow:var(--c-glow-cyan)}
.demo-chip.active{background:var(--grad-primary);color:#fff;border-color:transparent;box-shadow:0 2px 16px rgba(6,182,212,.4)}
.demo-box .pwd{font-size:11px;color:var(--c-text-dimmer);margin-top:10px;display:flex;align-items:center;gap:4px;border-top:1px solid var(--c-line);padding-top:8px}
.demo-box .pwd code{background:rgba(6,182,212,.15);padding:1px 6px;border-radius:3px;font-size:11px;color:var(--c-primary-light);letter-spacing:1px}
.login-box .portal-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;padding:11px;background:transparent;border:1.5px solid var(--c-line);border-radius:var(--radius);font-size:13px;color:var(--c-text-dim);text-decoration:none;transition:all var(--transition);font-weight:500}
.login-box .portal-link:hover{border-color:var(--c-accent);color:var(--c-accent-light);box-shadow:var(--c-glow-violet)}
.login-box .portal-link svg{width:16px;height:16px}
.role-tabs{display:flex;gap:4px;margin-bottom:18px;background:rgba(15,21,37,.5);border-radius:var(--radius);padding:3px}
.role-tab{flex:1;text-align:center;padding:8px 6px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;color:var(--c-text-dimmer);transition:all var(--transition);white-space:nowrap}
.role-tab:hover{color:var(--c-text);background:rgba(255,255,255,.05)}
.role-tab.active{background:var(--grad-primary);color:#fff;box-shadow:0 2px 12px rgba(6,182,212,.3)}

/* ============ 主应用 ============ */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:linear-gradient(180deg,var(--c-bg-1),var(--c-bg-0));flex-shrink:0;display:flex;flex-direction:column;position:relative;z-index:10;border-right:1px solid var(--c-line)}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(6,182,212,.3),transparent)}
.sidebar .brand{padding:20px 18px 16px;font-size:15px;font-weight:700;color:#fff;border-bottom:1px solid var(--c-line);display:flex;align-items:center;gap:10px;letter-spacing:.3px}
.sidebar .brand .sb-logo{width:34px;height:34px;background:var(--grad-primary);border-radius:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;box-shadow:0 4px 16px rgba(6,182,212,.4)}
.sidebar .nav{flex:1;padding:10px 8px;overflow-y:auto}
.sidebar .nav-label{font-size:10px;color:var(--c-text-dimmer);text-transform:uppercase;letter-spacing:2px;font-weight:700;padding:14px 12px 5px}
.sidebar .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--c-text-dim);text-decoration:none;font-size:13px;cursor:pointer;border-radius:var(--radius-sm);transition:all var(--transition);font-weight:500;margin-bottom:1px;position:relative}
.sidebar .nav a svg{width:18px;height:18px;flex-shrink:0;opacity:.6;transition:all var(--transition)}
.sidebar .nav a:hover{background:rgba(6,182,212,.08);color:var(--c-primary-light)}
.sidebar .nav a:hover svg{opacity:1;color:var(--c-primary-light)}
.sidebar .nav a.active{background:linear-gradient(90deg,rgba(6,182,212,.18),transparent);color:#fff;font-weight:600;box-shadow:inset 2px 0 0 var(--c-primary),var(--c-glow-cyan)}
.sidebar .nav a.active svg{opacity:1;color:var(--c-primary-light)}
.sidebar .sb-footer{padding:12px 14px;border-top:1px solid var(--c-line);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--c-text-dim)}
.sidebar .sb-footer .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--c-accent),var(--c-primary));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;font-size:12px;box-shadow:var(--c-glow-violet)}
.sidebar .sb-footer .nm{font-weight:600;color:var(--c-text);line-height:1.2}
.sidebar .sb-footer .rl{font-size:10px;color:var(--c-text-dimmer)}

.main{flex:1;padding:24px 30px;overflow-y:auto;min-width:0;background:var(--c-bg-0)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.header h2{font-size:21px;color:#fff;font-weight:700;background:linear-gradient(90deg,#fff,var(--c-primary-light));-webkit-background-clip:text;background-clip:text;color:transparent}
.header .actions button{background:var(--glass-bg);backdrop-filter:blur(10px);border:1px solid var(--c-line);padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--c-text-dim);transition:all var(--transition);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.header .actions button:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:var(--c-danger);box-shadow:0 0 16px rgba(239,68,68,.25)}
.header .actions button svg{width:16px;height:16px}

.card{background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--glass-border);transition:border-color var(--transition)}
.card:hover{border-color:rgba(6,182,212,.2)}
.card h3{font-size:15px;color:#fff;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--c-line);font-weight:600;display:flex;align-items:center;gap:8px}
.card h3::before{content:'';display:inline-block;width:3px;height:16px;background:var(--grad-primary);border-radius:2px;box-shadow:var(--c-glow-cyan)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}

<script>
// ==================== Toast ====================
function toast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  el.onclick = () => el.remove();
  container.appendChild(el);
  setTimeout(() => { if(el.parentNode) el.remove(); }, 3500);
}

function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

// ==================== State ====================
let token = localStorage.getItem('token');
let currentUser = null;
const ROLE_NAMES = {admin:'管理员',ops_manager:'运营主管',dispatcher:'调度员',finance_manager:'财务主管',finance:'财务',customer_service:'客服',boss:'老板',customer:'客户',driver:'司机'};
const STATUS_WAYBILL = {draft:'草稿',confirmed:'已确认',scheduled:'已调度',loaded:'已装车',in_transit:'运输中',arrived:'已到达',signed:'已签收',completed:'已完成',cancelled:'已取消',exception:'异常'};
const STATUS_BILLING = {draft:'草稿',sent:'已发送',confirmed:'已确认',invoiced:'已开票',paid:'已付款'};
const VEHICLE_TYPES = {small_truck:'小货车',medium_truck:'中型货车',heavy_truck:'重型货车'};
const SETTLE_TYPES = {monthly:'月结',per_trip:'趟结',prepaid:'预付'};
const FUEL_TYPES = {gas:'汽油',diesel:'柴油'};
const COST_TYPES = {fuel:'油费',toll:'过路费',driver_pay:'司机提成',loading:'装卸费',penalty:'罚款',other:'其他'};
const VEHICLE_STATUS = {idle:'空闲',maintenance:'维修',en_route:'运输中'};
const DRIVER_STATUS = {available:'空闲',on_trip:'出车中',leave:'休假'};
const VERIFY_STATUS = {pending:'待审核',verified:'已审核'};
const STOP_STATUS = {pending:'待到达',arrived:'已到达',completed:'已完成'};
const STOP_TYPES = {pickup:'提货',delivery:'卸货'};

function getStatusBadge(status) {
  const map = {draft:'badge-gray',confirmed:'badge-blue',scheduled:'badge-blue',loaded:'badge-yellow',in_transit:'badge-yellow',arrived:'badge-green',signed:'badge-green',completed:'badge-green',cancelled:'badge-red',exception:'badge-red'};
  return map[status]||'badge-gray';
}

if (token) {
  JiaruiAPI.auth.me().then(r => {
    if (r.code===200) { currentUser=r.data; showApp(); }
    else localStorage.removeItem('token');
  });
}

async function fetchAPI(url, options={}) {
  const headers = { 'Content-Type':'application/json', ...(options.headers||{}) };
  if (token) headers['Authorization'] = 'Bearer '+token;
  const res = await fetch(url, { headers, ...options, body: options.body });
  return res.json();
}

// ==================== Modal ====================
function showFormModal(title, fields, onSubmit) {
  const modal = document.getElementById('modalBox');
  const hasSections = fields.some(f => f.section);
  let fieldHtml = '';
  if (hasSections) {
    const sections = {}, noSection = [];
    fields.forEach(f => {
      if (f.section) { if (!sections[f.section]) sections[f.section] = []; sections[f.section].push(f); }
      else noSection.push(f);
    });
    for (const [sec, secFields] of Object.entries(sections)) {
      const secLabel = secFields[0]._sectionLabel || sec;
      fieldHtml += `<div class="form-section"><div class="form-section-label">${secLabel}</div><div class="form-grid">`;
      secFields.forEach(f => { fieldHtml += `<div class="col-${f.col||6}">${renderField(f)}</div>`; });
      fieldHtml += `</div></div>`;
    }
    if (noSection.length > 0) {
      fieldHtml += `<div class="form-grid">`;
      noSection.forEach(f => { fieldHtml += `<div class="col-${f.col||12}">${renderField(f)}</div>`; });
      fieldHtml += `</div>`;
    }
  } else {
    fieldHtml = fields.map(f => renderField(f)).join('');
  }
  modal.innerHTML = `<div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">${fieldHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalSubmitBtn">保存</button></div>`;
  document.getElementById('modalSubmitBtn').onclick = async function() {
    const btn = this;
    if (btn.disabled) return;  // 防重复提交
    btn.disabled = true;
    btn.textContent = '保存中...';
    const data = {};
    fields.forEach(f => { data[f.name] = document.getElementById('f_'+f.name)?.value; });
    if (data._id !== undefined) data._id = parseInt(data._id);
    try { await onSubmit(data); }
    finally { btn.disabled = false; btn.textContent = '保存'; }
  };
  document.getElementById('modalBg').classList.add('show');
}

function renderField(f) {
  let input;
  if (f.type==='html') {
    return f.html||'';
  } else if (f.type==='select') {
    input = `<select id="f_${f.name}">${(f.options||[]).map(o=>`<option value="${o.v}" ${(f.value||'')==o.v?'selected':''}>${o.l}</option>`).join('')}</select>`;
  } else if (f.type==='textarea') {
    input = `<textarea id="f_${f.name}" placeholder="${f.placeholder||''}">${f.value||''}</textarea>`;
  } else if (f.type==='hidden') {
    return `<input id="f_${f.name}" type="hidden" value="${f.value||''}">`;
  } else {
    input = `<input id="f_${f.name}" type="${f.type||'text'}" placeholder="${f.placeholder||''}" value="${f.value||''}">`;
  }
  return `<label>${f.label||''}${f.required?' <span class="required">*</span>':''}</label>${input}`;
}

function showConfirmModal(title, msg, onConfirm, danger) {
  const modal = document.getElementById('modalBox');
  const btnLabel = danger ? '确认删除' : '确认';
  modal.innerHTML = `<div class="modal-header" style="border-left-color:${danger?'var(--c-danger)':'var(--c-primary)'}"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body"><p style="color:var(--c-gray-600);margin:8px 0;line-height:1.6;font-size:14px">${msg}</p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn ${danger?'btn-danger':'btn-primary'}" id="confirmYesBtn">${btnLabel}</button></div>`;
  document.getElementById('confirmYesBtn').onclick = async function() {
    this.disabled = true;
    closeModal();

  };
  document.getElementById('modalBg').classList.add('show');
}

async function doLogin() {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;
  if (!username||!password) { document.getElementById('loginErr').textContent='请输入用户名和密码'; return; }
  showLoading();
  const r = await JiaruiAPI.auth.login(username, password);
  hideLoading();
  if (r.code===200) {
    token = r.data.accessToken;
    currentUser = r.data;
    localStorage.setItem('token', token);
    // 也存一份到 client_token 供客户门户用
    localStorage.setItem('client_token', JSON.stringify(r.data));
    toast('登录成功');
    if (r.data.role==='customer') { location.href = '/client'; return; }
    if (r.data.role==='driver') { location.href = '/driver'; return; }
    showApp();
  } else {
    document.getElementById('loginErr').textContent = r.message;
    toast(r.message||'登录失败', 'error');
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

function exportCSV() {
  const rows = [['运单号','客户','货物','报价','状态','创建时间']];
  document.querySelectorAll('#pageContent table tbody tr').forEach(tr=>{
    const cells = tr.querySelectorAll('td');
    if (cells.length >= 6) rows.push([cells[0].textContent.trim(),cells[1].textContent.trim(),cells[2].textContent.trim(),cells[3].textContent.trim(),cells[4].textContent.trim(),cells[5].textContent.trim()]);
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>'"'+c.replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '运单导出_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); toast('CSV已下载（可用Excel打开）','success');
}

let waybillCoordinateMap=null,coordinateTarget='pickup',coordinateMarkers={};
function setCoordinateTarget(target){
  coordinateTarget=target;
  document.getElementById('pickPickupBtn')?.classList.toggle('active',target==='pickup');
  document.getElementById('pickDeliveryBtn')?.classList.toggle('active',target==='delivery');
  const status=document.getElementById('coordinateStatus');if(status)status.textContent=`当前正在选择${target==='pickup'?'提货点':'送货点'}，请在地图上点击真实位置。`;
  const longitude=Number(document.getElementById(`f_${target}Longitude`)?.value),latitude=Number(document.getElementById(`f_${target}Latitude`)?.value);
  if(waybillCoordinateMap&&Number.isFinite(longitude)&&Number.isFinite(latitude))waybillCoordinateMap.setView([latitude,longitude],15);
}
function setWaybillCoordinate(target,longitude,latitude,source){
  const longitudeInput=document.getElementById(`f_${target}Longitude`),latitudeInput=document.getElementById(`f_${target}Latitude`);if(!longitudeInput||!latitudeInput)return;
  longitudeInput.value=Number(longitude).toFixed(6);latitudeInput.value=Number(latitude).toFixed(6);
  if(coordinateMarkers[target])waybillCoordinateMap.removeLayer(coordinateMarkers[target]);
  const pickup=target==='pickup',color=pickup?'#2563eb':'#dc2626',label=pickup?'取':'达';
  const icon=L.divIcon({html:`<div style="background:${color};color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.35)">${label}</div>`,className:'',iconSize:[30,30],iconAnchor:[15,15]});
  coordinateMarkers[target]=L.marker([latitude,longitude],{icon}).addTo(waybillCoordinateMap);
  const status=document.getElementById('coordinateStatus');if(status)status.textContent=`${pickup?'提货点':'送货点'}已设置：${Number(longitude).toFixed(6)}, ${Number(latitude).toFixed(6)}（${source}）`;
  if(coordinateMarkers.pickup&&coordinateMarkers.delivery)waybillCoordinateMap.fitBounds(L.featureGroup(Object.values(coordinateMarkers)).getBounds().pad(.2),{maxZoom:16});
}
function setCoordinateMapLoading(message,state){
  const loading=document.getElementById('coordinateMapLoading');if(!loading)return;
  loading.classList.toggle('hidden',state==='hidden');loading.classList.toggle('error',state==='error');
  loading.innerHTML=state==='error'?`${message}<button type="button" class="btn btn-ghost" onclick="initWaybillCoordinatePicker()">重新加载</button>`:message;
}
function refreshWaybillCoordinateMap(){
  [0,120,350,800].forEach(delay=>setTimeout(()=>{if(waybillCoordinateMap&&document.getElementById('waybillCoordinateMap'))waybillCoordinateMap.invalidateSize({pan:false});},delay));
}
function initWaybillCoordinatePicker(attempt=0){
  const mapElement=document.getElementById('waybillCoordinateMap');
  if(!mapElement)return;
  if(typeof L==='undefined'){setCoordinateMapLoading('地图组件加载失败，请刷新页面后重试','error');return;}
  if((mapElement.clientWidth<100||mapElement.clientHeight<100)&&attempt<20){requestAnimationFrame(()=>setTimeout(()=>initWaybillCoordinatePicker(attempt+1),50));return;}
  if(waybillCoordinateMap){waybillCoordinateMap.remove();coordinateMarkers={};}
  setCoordinateMapLoading('地图加载中…','loading');
  waybillCoordinateMap=L.map(mapElement,{attributionControl:false,preferCanvas:true,zoomControl:true}).setView([22.8,113.8],8);
  let fallbackStarted=false,tileLoaded=false;
  const addTiles=url=>{
    const layer=L.tileLayer(url,{subdomains:'1234',maxZoom:18,updateWhenIdle:true,keepBuffer:2,crossOrigin:true});
    layer.on('tileload',()=>{tileLoaded=true;setCoordinateMapLoading('','hidden');});
    layer.on('tileerror',()=>{
      if(!fallbackStarted){fallbackStarted=true;waybillCoordinateMap.removeLayer(layer);addTiles('https://webst0{s}.is.autonavi.com/appmaptile?style=7&x={x}&y={y}&z={z}');}
    });
    layer.addTo(waybillCoordinateMap);
  };
  addTiles('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}');
  setTimeout(()=>{if(!tileLoaded)setCoordinateMapLoading('底图网络较慢，可重试加载','error');},5000);
  waybillCoordinateMap.on('click',event=>setWaybillCoordinate(coordinateTarget,event.latlng.lng,event.latlng.lat,'地图选点'));
  setCoordinateTarget('pickup');refreshWaybillCoordinateMap();
}
function useCurrentCoordinate(){
  if(!navigator.geolocation){toast('当前浏览器不支持定位','error');return;}
  toast('正在获取当前位置…','info');
  navigator.geolocation.getCurrentPosition(position=>{const converted=wgs84ToGcj02(position.coords.longitude,position.coords.latitude);setWaybillCoordinate(coordinateTarget,converted.longitude,converted.latitude,'设备定位');waybillCoordinateMap?.setView([converted.latitude,converted.longitude],16);},error=>toast('当前位置获取失败：'+(error.message||'请检查定位权限'),'error'),{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
}
function wgs84ToGcj02(longitude,latitude){
  const pi=Math.PI,a=6378245,ee=.00669342162296594323;if(longitude<72.004||longitude>137.8347||latitude<.8293||latitude>55.8271)return{longitude,latitude};
  const transformLat=(x,y)=>{let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*pi)+20*Math.sin(2*x*pi))*2/3;r+=(20*Math.sin(y*pi)+40*Math.sin(y/3*pi))*2/3;r+=(160*Math.sin(y/12*pi)+320*Math.sin(y*pi/30))*2/3;return r};
  const transformLng=(x,y)=>{let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*pi)+20*Math.sin(2*x*pi))*2/3;r+=(20*Math.sin(x*pi)+40*Math.sin(x/3*pi))*2/3;r+=(150*Math.sin(x/12*pi)+300*Math.sin(x/30*pi))*2/3;return r};
  let dLat=transformLat(longitude-105,latitude-35),dLng=transformLng(longitude-105,latitude-35),radLat=latitude/180*pi,magic=Math.sin(radLat);magic=1-ee*magic*magic;const sqrtMagic=Math.sqrt(magic);dLat=dLat*180/((a*(1-ee))/(magic*sqrtMagic)*pi);dLng=dLng*180/(a/sqrtMagic*Math.cos(radLat)*pi);return{longitude:longitude+dLng,latitude:latitude+dLat};
}

async function showWaybillDetail(id) {
  showLoading();
  const r = await JiaruiAPI.waybill.get(id);
  hideLoading();
  if (r.code!==200) { toast('运单不存在','error'); return; }
  const w = r.data;
  const statusFlow = ['draft','confirmed','scheduled','loaded','in_transit','arrived','signed','completed'];
  const statusHtml = statusFlow.map((s,i) => `<span class="status-dot ${s===w.status?'current':''}">${STATUS_WAYBILL[s]}</span>${i<statusFlow.length-1?'<span class="status-arrow">▸</span>':''}`).join('');

  const transitions = {
    confirmed: [{to:'scheduled',label:'派车调度',needDispatch:true}],
    scheduled: [{to:'loaded',label:'确认装车'},{to:'cancelled',label:'取消运单'},{to:'exception',label:'标记异常'}],
    loaded: [{to:'in_transit',label:'确认发车'},{to:'exception',label:'标记异常'}],
    in_transit: [{to:'arrived',label:'确认到达'},{to:'exception',label:'标记异常'}],
    arrived: [{to:'signed',label:'确认签收'}],
    signed: [{to:'completed',label:'完成归档'}]
  };

  let btnHtml = '';
  if (['admin','ops_manager','dispatcher'].includes(currentUser.role)) {
    if (w.status==='confirmed') btnHtml += `<button class="btn btn-success" onclick="quickSchedule(${w.id})">派车 (推荐)</button>`;
    (transitions[w.status]||[]).forEach(t => {
      if (!t.needDispatch) btnHtml += `<button class="btn ${t.to==='cancelled'?'btn-danger':t.to==='exception'?'btn-warning':'btn-success'}" onclick="transitionWaybill(${w.id},'${t.to}')">${t.label}</button>`;
    });
  }

  const stops = (w.stops||[]).map(s => `<tr><td>${s.stop_seq}</td><td>${STOP_TYPES[s.stop_type]||s.stop_type}</td><td>${s.province||'-'}${s.city||''}${s.district||''}</td><td>${s.address_detail||''}</td><td>${s.contact_name||''} ${s.contact_phone||''}</td><td><span class="badge ${s.status==='completed'?'badge-green':s.status==='arrived'?'badge-blue':'badge-gray'}">${STOP_STATUS[s.status]||s.status}</span></td></tr>`).join('');
  const canVerifyCost = ['admin','finance_manager','finance'].includes(currentUser.role);
  const costs = (w.costs||[]).map(c => `<tr><td>${COST_TYPES[c.cost_type]||c.cost_type}</td><td class="color-success"><b>¥${c.cost_amount||0}</b></td><td>${c.cost_desc||''}</td><td><span class="badge ${c.verify_status==='verified'?'badge-green':'badge-yellow'}">${VERIFY_STATUS[c.verify_status]||c.verify_status}</span>${c.verify_status==='pending'&&canVerifyCost?` <button class="btn btn-success btn-sm" onclick="verifyCost(${c.id},${w.id})">审核</button>`:''}</td></tr>`).join('');

  const modal = document.getElementById('modalBox');
  modal.innerHTML = `
  <div class="modal-header"><h3>运单详情 &mdash; ${w.waybill_no}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
  <div class="modal-body">
    <p style="margin-bottom:12px">客户: <b>${w.customer_name||'-'}</b> &nbsp;|&nbsp; 货物: <b>${w.cargo_name}</b> &nbsp;|&nbsp; 报价: <b class="color-success">¥${(w.quoted_fee||0).toFixed(0)}</b></p>
    <div class="status-flow">${statusHtml}</div>
    ${btnHtml ? `<div style="margin:12px 0;display:flex;gap:6px;flex-wrap:wrap">${btnHtml}</div>` : ''}
    <h4 style="margin:14px 0 6px;color:var(--c-gray-500)">站点信息</h4>
    <div class="table-wrap"><table>${stops||'<tr><td colspan="6" class="empty">无站点</td></tr>'}</table></div>
    <h4 style="margin:14px 0 6px;color:var(--c-gray-500)">费用明细</h4>
    <div class="table-wrap"><table>${costs||'<tr><td colspan="4" class="empty">无费用记录</td></tr>'}</table></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-primary" onclick="recordCost(${w.id})">记录费用</button>
    <button class="btn btn-warning" onclick="calculateSnapshot(${w.id})">核算成本</button>
    <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
  </div>`;
  document.getElementById('modalBg').classList.add('show');
}

async function transitionWaybill(id, status) {
  const r = await JiaruiAPI.waybill.transition(id, status);
  if (r.code===200) { toast(r.message,'success'); closeModal(); navTo('waybills'); }
  else toast(r.message,'error');
}

async function deleteWaybill(id, no) {
  showConfirmModal('删除运单', `确认删除运单「${no}」? 此操作不可恢复。`, async () => {
    const r = await JiaruiAPI.waybill.delete(id);
    if (r.code===200) { toast('已删除','success'); navTo('waybills'); }
    else toast(r.message,'error');
  }, true);
}

async function quickSchedule(id) {
  const [rec, drivers] = await Promise.all([JiaruiAPI.dispatch.recommend(id), JiaruiAPI.dispatch.getDrivers()]);
  if (!rec.data?.length) { toast('没有载重符合且空闲的车辆','warning'); return; }
  if (!drivers.data?.length) { toast('没有可用司机','warning'); return; }
  const best = rec.data[0];
  const driver = drivers.data[0];
  if (!confirm(`推荐车辆: ${best.plateNumber} (${VEHICLE_TYPES[best.vehicleType]||best.vehicleType})\n推荐司机: ${driver.name}\n评分: ${best.score}\n\n确认派车?`)) return;
  const r = await JiaruiAPI.waybill.transition(id, 'scheduled', {vehicleId: best.vehicleId, driverId: driver.id});
  if (r.code===200) { toast('派车成功','success'); closeModal(); navTo('waybills'); }
  else toast(r.message,'error');
}

async function recordCost(waybillId) {
  showFormModal('记录费用', [
    {name:'costType',label:'费用类型',type:'select',options:[{v:'fuel',l:'油费'},{v:'toll',l:'过路费'},{v:'driver_pay',l:'司机提成'},{v:'loading',l:'装卸费'},{v:'penalty',l:'罚款'},{v:'other',l:'其他'}]},
    {name:'amount',label:'金额 (元)',type:'number',required:true},
    {name:'desc',label:'费用说明'}
  ], async (data) => {
    const r = await JiaruiAPI.cost.create({waybillId, costType:data.costType, costAmount:parseFloat(data.amount), costDesc:data.desc});
    if (r.code===200) { toast('费用已记录','success'); closeModal(); showWaybillDetail(waybillId); }
    else toast(r.message||'记录失败','error');
  });
}

async function verifyCost(costId, waybillId) {
  const r = await JiaruiAPI.cost.verify(costId);
  if (r.code===200) { toast('费用已审核','success'); showWaybillDetail(waybillId); }
  else toast(r.message||'审核失败','error');
}

async function calculateSnapshot(waybillId) {
  showLoading();
  const r = await JiaruiAPI.cost.snapshot(waybillId);
  hideLoading();
  if (r.code===200) {
    const d = r.data;
    const profit = parseFloat(d.profit);
    const modal = document.getElementById('modalBox');
    modal.innerHTML = `
    <div class="modal-header"><h3>成本快照 &mdash; ${d.waybillNo}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <table><tr><th>项目</th><th>金额</th></tr>
      <tr><td>运费报价</td><td class="color-success"><b>¥${d.quotedFee}</b></td></tr>
      <tr><td>直接成本</td><td>¥${d.directCost}</td></tr>
      <tr><td>间接成本</td><td>¥${d.indirectCost}</td></tr>
      <tr><td><b>总成本</b></td><td><b>¥${d.totalCost}</b></td></tr>
      <tr><td style="font-weight:700;color:${profit>0?'var(--c-success)':'var(--c-danger)'}">利润</td><td style="font-weight:700;font-size:17px;color:${profit>0?'var(--c-success)':'var(--c-danger)'}">${profit>0?'+':''}¥${d.profit}</td></tr>
      <tr><td>利润率</td><td>${d.profitMargin}</td></tr></table>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">关闭</button></div>`;
    document.getElementById('modalBg').classList.add('show');
  } else toast(r.message,'error');
}

async function renderDispatch() {
  const [waybills, vehicles, drivers] = await Promise.all([
    JiaruiAPI.waybill.list(),
    JiaruiAPI.dispatch.getVehicles(),
    JiaruiAPI.dispatch.getDrivers()
  ]);
  const pending = (waybills.data||[]).filter(w => w.status==='confirmed');
  const allVehicles = vehicles.data||[];
  const idleVehicles = allVehicles.filter(vehicle=>vehicle.status==='idle');
  const availableDrivers = drivers.data||[];
  const canDispatch = ['admin','ops_manager','dispatcher'].includes(currentUser.role);
  const globalWarning = !idleVehicles.length || !availableDrivers.length
    ? `<div class="dispatch-resource-note">${!idleVehicles.length?'当前没有空闲车辆。':''}${!idleVehicles.length&&!availableDrivers.length?' ':''}${!availableDrivers.length?'当前没有可用司机。':''} 请先完成或取消占用资源的运单，或在“车辆司机”中增加可用资源。</div>`
    : '';
  return `
  <div class="card"><h3>待调度运单 (${pending.length})</h3>
  ${globalWarning}
  ${pending.length===0 ? '<div class="empty">暂无待调度运单</div>' : pending.map(w => {
    const eligibleVehicles = idleVehicles.filter(vehicle => Number(vehicle.max_load_kg||0) >= Number(w.cargo_weight_kg||0));
    const canScheduleThis = canDispatch && eligibleVehicles.length>0 && availableDrivers.length>0;
    const vehicleOptions = eligibleVehicles.length
      ? `<option value="">请选择车辆</option>${eligibleVehicles.map(vehicle=>`<option value="${vehicle.id}">${vehicle.plate_number} · ${VEHICLE_TYPES[vehicle.vehicle_type]||vehicle.vehicle_type} · 载重${vehicle.max_load_kg||0}kg</option>`).join('')}`
      : `<option value="">无满足载重的空闲车辆</option>`;
    const driverOptions = availableDrivers.length
      ? `<option value="">请选择司机</option>${availableDrivers.map(driver=>`<option value="${driver.id}">${driver.name} · ${driver.phone||'无电话'}</option>`).join('')}`
      : `<option value="">无可用司机</option>`;
    return `
    <div style="border:1px solid var(--c-gray-200);border-radius:var(--radius);padding:14px;margin:10px 0;background:var(--c-gray-50)">
      <div class="dispatch-card-row">
        <b>${w.waybill_no}</b>
        <span class="badge badge-blue">${w.cargo_name}</span>
        <span style="font-size:12px;color:var(--c-text-dim)">重量 ${Number(w.cargo_weight_kg||0).toFixed(0)} kg</span>
        <span class="color-success"><b>¥${(w.quoted_fee||0).toFixed(0)}</b></span>
        <select id="veh_${w.id}" class="dispatch-select" aria-label="选择车辆" ${eligibleVehicles.length?'':'disabled'}>${vehicleOptions}</select>
        <select id="drv_${w.id}" class="dispatch-select" aria-label="选择司机" ${availableDrivers.length?'':'disabled'}>${driverOptions}</select>
        <button class="btn btn-success" onclick="doSchedule(${w.id})" ${canScheduleThis?'':'disabled'}>派车</button>
        ${eligibleVehicles.length===0?'<div class="dispatch-resource-note">没有载重满足该运单的空闲车辆。</div>':''}
      </div>
    </div>`;
  }).join('')}
  </div>
  <div class="card"><h3>车辆状态一览</h3>
  <div class="table-wrap"><table><tr><th>车牌号</th><th>车型</th><th>状态</th><th>载重 (kg)</th><th>容积 (m³)</th></tr>
  ${allVehicles.map(v => `
  <tr><td><b>${v.plate_number}</b></td><td>${VEHICLE_TYPES[v.vehicle_type]||v.vehicle_type}</td>
  <td><span class="badge ${v.status==='idle'?'badge-green':v.status==='maintenance'?'badge-red':'badge-yellow'}">${VEHICLE_STATUS[v.status]||v.status}</span></td>
  <td>${v.max_load_kg}</td><td>${v.max_volume_m3}</td></tr>`).join('')}</table></div></div>`;
}

async function doSchedule(waybillId) {
  const vehicleSelect = document.getElementById('veh_'+waybillId);
  const driverSelect = document.getElementById('drv_'+waybillId);
  const vehicleId = Number(vehicleSelect?.value);
  const driverId = Number(driverSelect?.value);
  if (!vehicleId) { toast('请先选择可用车辆','warning'); vehicleSelect?.focus(); return; }
  if (!driverId) { toast('请先选择可用司机','warning'); driverSelect?.focus(); return; }
  const r = await JiaruiAPI.waybill.transition(waybillId, 'scheduled', {vehicleId, driverId});
  if (r.code===200) { toast('派车成功','success'); navTo('dispatch'); }
  else toast(r.message,'error');
}

    ${b.status==='draft'&&canBilling?`<button class="btn btn-primary btn-sm" onclick="sendBilling(${b.id})">发送</button>`:''}
    ${b.status==='draft'&&canBilling?`<button class="btn btn-danger btn-sm" onclick="deleteBilling(${b.id},'${b.statement_no}')"><svg class="ic-sm"><use href="#ic-trash"/></svg></button>`:''}
    ${b.status==='sent'&&canBilling?`<button class="btn btn-success btn-sm" onclick="confirmBilling(${b.id})">确认</button>`:''}
    ${b.status==='confirmed'?`<span class="badge badge-green">待开票</span>`:''}
    </td></tr>`).join('')+'</div>';
  billingSection += `</div>`;

  return `
  ${billingSection}
  <div class="card"><h3>运单费用管理</h3>
  ${transitList.length===0 ? '<div class="empty">暂无可管理的运单</div>' :

  <td><button class="btn btn-primary btn-sm" onclick="recordCost(${w.id})">记费用</button>
  <button class="btn btn-warning btn-sm" onclick="calculateSnapshot(${w.id})">核算</button></td></tr>`).join('')
  }</div>`;
}

  showFormModal(isEdit?'编辑用户':'新增用户', [
    {name:'username',label:'用户名',required:true,value:u.username||'', section:'account',_sectionLabel:'账号信息',col:6},
    {name:'password',label:isEdit?'新密码 (留空不修改)':'密码',required:!isEdit,type:'password',placeholder:isEdit?'留空则不修改密码':'', section:'account',col:6},
    {name:'displayName',label:'显示名',value:u.display_name||'', section:'account',col:6},
    {name:'role',label:'角色',type:'select',value:u.role||'dispatcher',options:[{v:'admin',l:'管理员'},{v:'ops_manager',l:'运营主管'},{v:'dispatcher',l:'调度员'},{v:'finance_manager',l:'财务主管'},{v:'finance',l:'财务'},{v:'customer_service',l:'客服'},{v:'boss',l:'老板'},{v:'customer',l:'客户'},{v:'driver',l:'司机'}], section:'role',_sectionLabel:'角色权限',col:4},
    {name:'phone',label:'电话',value:u.phone||'', section:'role',col:4},
    {name:'status',label:'状态',type:'select',value:String(u.status!==undefined?u.status:1),options:[{v:'1',l:'正常'},{v:'0',l:'禁用'}], section:'role',col:4}
  ], async (data) => {
    if (!data.username) { toast('请输入用户名','warning'); return; }
    if (!isEdit && !data.password) { toast('请输入密码','warning'); return; }
    try {
      let r;
      if (isEdit) { const body = {username:data.username,display_name:data.displayName,role:data.role,phone:data.phone,status:parseInt(data.status)}; if(data.password) body.password = data.password; r = await JiaruiAPI.user.update(id, body); }
      else { r = await JiaruiAPI.user.create({username:data.username,password:data.password,displayName:data.displayName,role:data.role,phone:data.phone}); }
      if (r.code===200) { toast(isEdit?'用户已更新':'用户已创建','success'); closeModal(); navTo('system'); }
      else toast(r.message,'error');
    } catch(e) { toast('请求异常','error'); }
  });
}
function showResetPassword(id, username) {
  showFormModal('重置密码 &mdash; '+username, [{name:'password',label:'新密码',required:true,type:'password'}], async (data) => {
    if (!data.password) { toast('请输入新密码','warning'); return; }
    const r = await JiaruiAPI.user.resetPassword(id, data.password);
    if (r.code===200) { toast('密码已重置','success'); closeModal(); } else toast(r.message,'error');
  });
}
async function disableUser(id, username) {
  showConfirmModal('禁用用户', `确认禁用用户「${username}」?`, async () => {
    const r = await JiaruiAPI.user.delete(id);
    if (r.code===200) { toast('已禁用','success'); navTo('system'); } else toast(r.message,'error');
  });
}
async function enableUser(id, username) {
  const r = await JiaruiAPI.user.enable(id);
  if (r.code===200) { toast('已启用','success'); navTo('system'); } else toast(r.message,'error');
}
async function deleteUser(id, username) {
  showConfirmModal('删除用户', `确认彻底删除用户「${username}」? 不可恢复!`, async () => {
    const r = await JiaruiAPI.user.delete(id, true);
    if (r.code===200) { toast('已删除','success'); navTo('system'); } else toast(r.message,'error');
  }, true);
}

// ==================== Track ====================
let lastTrackNo = '';
function renderTrackSearch() {
  // 切回来自动重新查询
  if (lastTrackNo) { setTimeout(() => searchTrack(lastTrackNo), 150); }
  return `
  <div class="card"><h3>运单轨迹追踪</h3>
  <div style="display:flex;gap:8px">
    <input id="trackNo" placeholder="输入运单号，如 YD202606170001" style="flex:1" value="${lastTrackNo}">
    <button class="btn btn-primary" onclick="searchTrack()"><svg class="ic-sm"><use href="#ic-search"/></svg>查询</button>
  </div></div>
  <div id="trackResult"></div>`;
}

let adminTrackMap = null, trackPollTimer = null;
async function searchTrack(presetNo) {
  const no = presetNo || document.getElementById('trackNo')?.value;
  if (!no) { toast('请输入运单号','warning'); return; }
  showLoading();
  const r = await JiaruiAPI.waybill.track(no);
  hideLoading();
  if (r.code!==200) { document.getElementById('trackResult').innerHTML=`<div class="card"><div class="empty">${r.message}</div></div>`; lastTrackNo=''; return; }
  const d = r.data, w = d.waybill, gps = d.gpsRecords||[], stops = d.stops||[], plannedRoute = d.plannedRoute||w.planned_route||[];
  lastTrackNo = no;
  if (adminTrackMap) { adminTrackMap.remove(); adminTrackMap = null; }
  if (trackPollTimer) { clearInterval(trackPollTimer); trackPollTimer = null; }

  let gpsTable = '';
  if (gps.length) {
    gpsTable = '<div class="card"><h3>司机实际定位</h3><div class="table-wrap"><table><tr><th>时间（北京时间）</th><th>经度</th><th>纬度</th><th>精度</th><th>速度</th><th>来源</th></tr><tbody id="trackGpsTable">'+
    gps.map(g=>`<tr style="${g.driver_name?'background:rgba(16,185,129,.08)!important':''}"><td>${(g.device_time||'').slice(0,19)}</td><td>${g.longitude?.toFixed(4)}</td><td>${g.latitude?.toFixed(4)}</td><td>${g.accuracy_m?Math.round(g.accuracy_m)+' m':'-'}</td><td>${g.speed_kmh?.toFixed(0)||'-'} km/h</td><td>${g.driver_name?'<span style="color:#10b981">📱 '+g.driver_name+'</span>':'<span style="color:#64748b">系统</span>'}</td></tr>`).join('')+'</tbody></table></div></div>';
  }

  const stopsHtml = stops.map((s,i) => `
  <div style="display:flex;align-items:center;padding:10px 12px;border-left:4px solid ${i===0?'var(--c-success)':i===stops.length-1?'var(--c-danger)':'var(--c-primary)'};margin-bottom:6px;background:var(--c-gray-50);border-radius:4px">
    <div style="flex:1"><b>第${s.stop_seq}站:</b> ${STOP_TYPES[s.stop_type]||s.stop_type}</div>
    <div style="color:var(--c-gray-500);font-size:12px">${s.province||''}${s.city||''}${s.district||''} ${s.address_detail||''}</div>
    <span class="badge ${s.status==='completed'?'badge-green':s.status==='arrived'?'badge-blue':'badge-gray'}">${STOP_STATUS[s.status]||s.status}</span>
  </div>`).join('');

  document.getElementById('trackResult').innerHTML = `
  <div class="card" style="padding:0">
    <div style="padding:16px 20px;border-bottom:1px solid var(--c-gray-100)"><h3 style="margin:0">${w.waybill_no} &mdash; ${w.cargo_name}</h3><p style="margin-top:6px;color:var(--c-gray-500);font-size:13px">状态: <span class="badge ${getStatusBadge(w.status)}">${STATUS_WAYBILL[w.status]}</span> &nbsp;|&nbsp; 报价: <b class="color-success">&yen;${(w.quoted_fee||0).toFixed(0)}</b></p></div>
    <div style="padding:10px 20px;background:rgba(15,23,42,.55);font-size:12px;color:var(--c-text-dim);display:flex;gap:18px;flex-wrap:wrap"><span><b style="color:#38bdf8">虚线</b> 计划路线</span><span><b style="color:#10b981">实线</b> 司机实际轨迹</span><span>站点坐标来自运单地址</span></div><div id="adminTrackMap" style="width:100%;height:380px;background:#dbeafe"></div>
    <div style="padding:14px 20px"><h4 style="color:var(--c-gray-500);margin-bottom:10px">运输路径</h4>${stopsHtml}</div>
  </div>${gpsTable}`;

  // Init map: planned route renders immediately; online tiles load independently.
  setTimeout(() => {
    const mapEl = document.getElementById('adminTrackMap');
    if (!mapEl || typeof L === 'undefined') return;
    adminTrackMap = L.map(mapEl, { attributionControl:false, preferCanvas:true }).setView([23.1,113.3],8);
    const tileNotice = L.control({position:'bottomleft'});
    tileNotice.onAdd = () => {
      const element = L.DomUtil.create('div');
      element.style.cssText = 'background:rgba(15,23,42,.9);color:#cbd5e1;padding:6px 9px;border-radius:7px;font-size:11px;display:none';
      element.textContent = '底图网络较慢，路线和站点仍可正常查看';
      return element;
    };
    tileNotice.addTo(adminTrackMap);
    const tileLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {subdomains:'1234',maxZoom:18,updateWhenIdle:true,keepBuffer:2,crossOrigin:true});
    let loadedTile = false;
    tileLayer.on('tileload', () => { loadedTile = true; });
    tileLayer.on('tileerror', () => { const element=tileNotice.getContainer();if(element)element.style.display='block'; });
    tileLayer.addTo(adminTrackMap);
    setTimeout(() => { if(!loadedTile){const element=tileNotice.getContainer();if(element)element.style.display='block'} },2500);

    const plannedPoints = plannedRoute.map(point => [Number(point.latitude),Number(point.longitude)]).filter(point => Number.isFinite(point[0])&&Number.isFinite(point[1]));
    const actualPoints = gps.map(point => [Number(point.latitude),Number(point.longitude)]).filter(point => Number.isFinite(point[0])&&Number.isFinite(point[1]));
    const stopPoints = [];
    if(plannedPoints.length>1)L.polyline(plannedPoints,{color:'#38bdf8',weight:5,opacity:.8,dashArray:'10 8',lineCap:'round'}).addTo(adminTrackMap).bindTooltip('计划路线');
    let actualLayer = actualPoints.length>1 ? L.polyline(actualPoints,{color:'#10b981',weight:4,opacity:.95,lineCap:'round'}).addTo(adminTrackMap).bindTooltip('司机实际轨迹') : null;

    stops.forEach(stop => {
      const latitude=Number(stop.latitude),longitude=Number(stop.longitude);
      if(!Number.isFinite(latitude)||!Number.isFinite(longitude))return;
      stopPoints.push([latitude,longitude]);
      const pickup=stop.stop_type==='pickup',color=pickup?'#2563eb':'#dc2626',label=pickup?'取':'达';
      const icon=L.divIcon({html:`<div style="background:${color};color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.35)">${label}</div>`,className:'',iconSize:[30,30],iconAnchor:[15,15]});
      const fullAddress=`${stop.province||''}${stop.city||''}${stop.district||''} ${stop.address_detail||''}`;
      const accuracy=stop.coordinate_source==='district_estimate'?'<br><span style="color:#f59e0b">区域估算位置</span>':'';
      L.marker([latitude,longitude],{icon}).addTo(adminTrackMap).bindPopup(`<b>第${stop.stop_seq}站 · ${pickup?'提货':'送货'}</b><br>${fullAddress}${accuracy}`);
    });

    let currentMarker=null;
    const pulseIcon=()=>L.divIcon({html:'<div style="width:16px;height:16px;background:#10b981;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 8px rgba(16,185,129,.18)"></div>',className:'',iconSize:[16,16],iconAnchor:[8,8]});
    if(actualPoints.length){const current=actualPoints[actualPoints.length-1];currentMarker=L.marker(current,{icon:pulseIcon()}).addTo(adminTrackMap).bindPopup(`<b>司机最新位置</b><br>${gps[gps.length-1].device_time||''}`)}
    const boundsPoints=[...plannedPoints,...actualPoints,...stopPoints];
    if(boundsPoints.length)adminTrackMap.fitBounds(L.latLngBounds(boundsPoints).pad(.12),{maxZoom:13});
    setTimeout(() => adminTrackMap&&adminTrackMap.invalidateSize(),50);

    if(w.status==='in_transit'){
      let pollCount=0,knownCount=gps.length;
      trackPollTimer=setInterval(async()=>{
        if(!document.getElementById('adminTrackMap')||pollCount>60){clearInterval(trackPollTimer);return}
        const latest=await JiaruiAPI.waybill.track(no);
        if(latest.code!==200){clearInterval(trackPollTimer);return}
        const latestGps=latest.data.gpsRecords||[];
        if(latestGps.length>knownCount&&adminTrackMap){
          knownCount=latestGps.length;
          const points=latestGps.map(point=>[Number(point.latitude),Number(point.longitude)]).filter(point=>Number.isFinite(point[0])&&Number.isFinite(point[1]));
          if(actualLayer)adminTrackMap.removeLayer(actualLayer);
          actualLayer=points.length>1?L.polyline(points,{color:'#10b981',weight:4,opacity:.95,lineCap:'round'}).addTo(adminTrackMap):null;
          if(currentMarker)adminTrackMap.removeLayer(currentMarker);
          if(points.length)currentMarker=L.marker(points[points.length-1],{icon:pulseIcon()}).addTo(adminTrackMap).bindPopup(`<b>司机最新位置</b><br>${latestGps[latestGps.length-1].device_time||''}`);
          const table=document.getElementById('trackGpsTable');
          if(table)table.innerHTML=latestGps.map(point=>`<tr><td>${(point.device_time||'').slice(0,19)}</td><td>${point.longitude?.toFixed(4)}</td><td>${point.latitude?.toFixed(4)}</td><td>${point.accuracy_m?Math.round(point.accuracy_m)+' m':'-'}</td><td>${point.speed_kmh?.toFixed(0)||'-'} km/h</td><td><span style="color:#10b981">${point.driver_name||'司机'}</span></td></tr>`).join('');
        }
        pollCount++;
      },10000);
    }
  },80);
}

function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
let _modalDownTarget = null;
document.getElementById('modalBg').addEventListener('mousedown', function(e) { _modalDownTarget = e.target; });
document.getElementById('modalBg').addEventListener('mouseup', function(e) {
  // 只在刻意点击遮罩时关闭（mousedown 和 mouseup 都在背景上）
  if (_modalDownTarget === this && e.target === this) closeModal();
  _modalDownTarget = null;
});

// Auto-fix: add viewBox to all rendering SVGs — uses MutationObserver for dynamic content
(function(){
  function fixSvg(svg) {
    if (!svg.hasAttribute('viewBox') && !svg.closest('defs') && svg.style.display !== 'none') {
      svg.setAttribute('viewBox', '0 0 20 20');
    }
  }
  // Fix existing
  document.querySelectorAll('svg').forEach(fixSvg);
  // Watch for dynamically added SVGs (e.g. in modals)
  new MutationObserver(mutations => {
    mutations.forEach(m => m.addedNodes.forEach(node => {
      if (node.nodeType === 1) {
        if (node.tagName === 'svg' || node.querySelectorAll) {
          if (node.tagName === 'svg') fixSvg(node);
          (node.querySelectorAll ? node.querySelectorAll('svg') : []).forEach(fixSvg);
        }
      }
    }));
  }).observe(document.body, { childList: true, subtree: true });
})();
</script>
