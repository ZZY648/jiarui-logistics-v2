# ============================================================
# 佳瑞物流 V2.0 - Apache APISIX 网关配置
# 部署: docker run -v $(pwd)/apisix-config.yaml:/usr/local/apisix/conf/apisix.yaml apache/apisix
# ============================================================

# 上游服务定义
upstreams:
  - id: 1
    nodes:
      "host.docker.internal:8080": 1     # Spring Boot 后端
    type: roundrobin
    checks:
      active:
        type: http
        http_path: /actuator/health
        healthy:
          interval: 2s
          successes: 2
        unhealthy:
          interval: 1s
          http_failures: 2

# 路由定义
routes:
  # ==================== 公开接口 ====================
  - id: 1
    uri: /api/auth/*
    upstream_id: 1
    methods: ["POST"]
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "*"
      limit-req:
        rate: 5
        burst: 10
        key: remote_addr
        rejected_code: 429

  - id: 2
    uri: /api/wx/callback
    upstream_id: 1
    methods: ["POST"]

  # ==================== 客户微信小程序 ====================
  - id: 10
    uri: /api/wx/*
    upstream_id: 1
    plugins:
      jwt-auth:
        key: jiarui_logistics_jwt_secret_key_2024_must_be_long_enough_256bit
        cookie: jiarui_token
      cors:
        allow_origins: "*"
        allow_headers: "*"

  # ==================== 司机端 ====================
  - id: 20
    uri: /api/driver/*
    upstream_id: 1
    plugins:
      jwt-auth:
        key: jiarui_logistics_jwt_secret_key_2024_must_be_long_enough_256bit
      cors:
        allow_origins: "*"
        allow_headers: "*"

  # ==================== 管理后台 ====================
  - id: 30
    uri: /api/admin/*
    upstream_id: 1
    plugins:
      jwt-auth:
        key: jiarui_logistics_jwt_secret_key_2024_must_be_long_enough_256bit
      cors:
        allow_origins: "*"
        allow_headers: "*"
      limit-req:
        rate: 100
        burst: 200
        key: remote_addr

  # ==================== 调度接口 ====================
  - id: 40
    uri: /api/dispatch/*
    upstream_id: 1
    plugins:
      jwt-auth:
        key: jiarui_logistics_jwt_secret_key_2024_must_be_long_enough_256bit

  # ==================== 费用接口 ====================
  - id: 50
    uri: /api/cost/*
    upstream_id: 1
    plugins:
      jwt-auth:
        key: jiarui_logistics_jwt_secret_key_2024_must_be_long_enough_256bit

  # ==================== 对账接口 ====================
  - id: 60
    uri: /api/billing/*
    upstream_id: 1
    plugins:
      jwt-auth:
        key: jiarui_logistics_jwt_secret_key_2024_must_be_long_enough_256bit

  # ==================== 健康检查 ====================
  - id: 99
    uri: /actuator/*
    upstream_id: 1

# 全局插件
plugins:
  - cors:
      allow_origins: "*"
      allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      allow_headers: "*"
      max_age: 3600
  - real-ip:
      source: http_x_forwarded_for

# 服务监控
plugin_metadata:
  prometheus:
    prefer_name: true
